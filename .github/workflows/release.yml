name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:ci

      - name: Build frontend
        run: npm run build

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx --yes
          -p semantic-release@25
          -p @semantic-release/changelog@6
          -p @semantic-release/exec@7
          -p @semantic-release/git@10
          -p @semantic-release/github@12
          -p @semantic-release/npm@13
          -p @semantic-release/commit-analyzer@13
          -p @semantic-release/release-notes-generator@14
          semantic-release

  package-plugin:
    name: Package plugin release asset
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package plugin
        id: package
        shell: bash
        run: |
          set -euo pipefail

          plugin_id="$(node -p "require('./src/plugin.json').id")"
          version="$(node -p "require('./package.json').version")"
          archive="${plugin_id}-${version}.zip"
          sha1sum_file="${archive}.sha1"

          mkdir -p "artifacts/${plugin_id}"
          cp -R dist/. "artifacts/${plugin_id}/"
          (cd artifacts && zip -r "../${archive}" "${plugin_id}")
          sha1sum "${archive}" > "${sha1sum_file}"

          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "sha1sum_file=${sha1sum_file}" >> "${GITHUB_OUTPUT}"

      - name: Attach plugin to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.sha1sum_file }}" \
            --clobber
